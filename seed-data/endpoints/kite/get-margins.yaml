endpoint:
  app: kite
  name: getMargins
  path: /oms/user/margins
  method: GET
  requiresAuth: true
  requestHeaders:
    - name: Authorization
      required: true
    - name: x-kite-app-uuid
      required: true
    - name: x-kite-userid
      required: true
    - name: x-kite-version
      required: true
  responseBody:
    type: object
    properties:
      status: { type: string }
      data:
        type: object
        properties:
          equity:
            type: object
            properties:
              enabled: { type: boolean }
              net: { type: number }
              available:
                type: object
                properties:
                  cash: { type: number }
  description: Retrieve user account margins for equity and commodity.
