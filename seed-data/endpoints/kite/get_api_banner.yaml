endpoint:
  app: kite
  name: get_api_banner
  path: /api/banner
  method: GET
  requiresAuth: true
  requestHeaders:
    sec-ch-ua-platform: '"Windows"'
    referer: https://kite.zerodha.com/dashboard
    user-agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like
      Gecko) Chrome/149.0.0.0 Safari/537.36
    accept: application/json, text/plain, */*
    sec-ch-ua: '"Chromium";v="149", "Not)A;Brand";v="24"'
    sec-ch-ua-mobile: '?0'
  responseBody:
    type: object
    properties:
      status:
        type: string
      data:
        type: object
        properties:
          image:
            type: string
          action_url:
            type: string
          action_label:
            type: string
          image_click:
            type: boolean
          action_button_background_color:
            type: string
          action_button_text_color:
            type: string
          action_button_alignment:
            type: string
          action_position_bottom:
            type: integer
          action_position_top:
            type: integer
          action_position_left:
            type: integer
          action_position_right:
            type: integer
          border_color:
            type: string
          dark:
            type: object
            properties:
              image:
                type: string
            required:
              - image
        required:
          - image
          - action_url
          - action_label
          - image_click
          - action_button_background_color
          - action_button_text_color
          - action_button_alignment
          - action_position_bottom
          - action_position_top
          - action_position_left
          - action_position_right
          - border_color
          - dark
    required:
      - status
      - data
  sampleResponse:
    status: success
    data:
      image: >-
        http://zerodha.com/z-connect/wp-content/uploads/2026/06/refer-banner-light.png
      action_url: https://zerodha.com/refer?source=kite-web
      action_label: ''
      image_click: true
      action_button_background_color: '#4184f3'
      action_button_text_color: '#FFFFFF'
      action_button_alignment: ''
      action_position_bottom: 33
      action_position_top: 0
      action_position_left: 150
      action_position_right: 0
      border_color: transparent
      dark:
        image: >-
          http://zerodha.com/z-connect/wp-content/uploads/2026/06/refer-banner-dark.png
  description: Captured API Endpoint for kite.
