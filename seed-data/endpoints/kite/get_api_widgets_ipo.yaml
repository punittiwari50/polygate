endpoint:
  app: kite
  name: get_api_widgets_ipo
  path: /api/widgets/ipo
  method: GET
  requiresAuth: true
  requestHeaders:
    x-kite-version: 3.0.0
    sec-ch-ua-platform: '"Windows"'
    x-csrftoken: <csrfToken>
    referer: https://kite.zerodha.com/dashboard
    sec-ch-ua: '"Chromium";v="149", "Not)A;Brand";v="24"'
    x-kite-app-uuid: <userAppId>
    sec-ch-ua-mobile: '?0'
    x-kite-userid: <userId>
    user-agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like
      Gecko) Chrome/149.0.0.0 Safari/537.36
    accept: application/json, text/plain, */*
  responseBody:
    type: object
    properties:
      status:
        type: string
      data:
        type: array
        items:
          type: object
          properties:
            tradingsymbol:
              type: string
            name:
              type: string
            start_date:
              type: string
            type:
              type: string
            end_date:
              type: string
            listing_date:
              type: string
            url:
              type: string
            thumb:
              type: string
            upcoming:
              type: boolean
            live:
              type: boolean
            closed:
              type: boolean
          required:
            - tradingsymbol
            - name
            - start_date
            - type
            - end_date
            - listing_date
            - url
            - thumb
            - upcoming
            - live
            - closed
    required:
      - status
      - data
