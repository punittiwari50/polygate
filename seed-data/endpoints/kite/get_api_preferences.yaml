endpoint:
  app: kite
  name: get_api_preferences
  path: /api/preferences
  method: GET
  requiresAuth: true
  requestHeaders:
    x-kite-version: 3.0.0
    sec-ch-ua-platform: '"Windows"'
    x-csrftoken: <csrfToken>
    referer: https://kite.zerodha.com/dashboard
    sec-ch-ua: '"Chromium";v="149", "Not)A;Brand";v="24"'
    x-kite-app-uuid: <userAppId>
    sec-ch-ua-mobile: '?0'
    x-kite-userid: <userId>
    user-agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like
      Gecko) Chrome/149.0.0.0 Safari/537.36
    accept: application/json, text/plain, */*
  responseBody:
    type: object
    properties:
      status:
        type: string
      data:
        type: object
        properties:
          chart_type:
            type: string
          order_update:
            type: string
          theme_web:
            type: string
          tours:
            type: string
        required:
          - chart_type
          - order_update
          - theme_web
          - tours
    required:
      - status
      - data
  sampleResponse:
    status: success
    data:
      chart_type: tradingview_beta
      order_update: 'true'
      theme_web: default
      tours: >-
        {"default":false,"order":false,"table":true,"notification":false,"marketdepth":false,"chart":false}
  description: Captured API Endpoint for kite.
