endpoint:
  app: kite
  name: get_oms_user_profile_full
  path: /oms/user/profile/full
  method: GET
  requiresAuth: true
  requestHeaders:
    x-kite-version: 3.0.0
    sec-ch-ua-platform: '"Windows"'
    authorization: required
    referer: https://kite.zerodha.com/dashboard
    sec-ch-ua: '"Chromium";v="149", "Not)A;Brand";v="24"'
    x-kite-app-uuid: <userAppId>
    sec-ch-ua-mobile: '?0'
    x-kite-userid: <userId>
    user-agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like
      Gecko) Chrome/149.0.0.0 Safari/537.36
    accept: application/json, text/plain, */*
  responseBody:
    type: object
    properties:
      status:
        type: string
      data:
        type: object
        properties:
          user_id:
            type: string
          twofa_type:
            type: string
          user_name:
            type: string
          user_type:
            type: string
          email:
            type: string
          phone:
            type: string
          phone_code:
            type: string
          broker:
            type: string
          bank_accounts:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                branch:
                  type: string
                account:
                  type: string
              required:
                - name
                - branch
                - account
          dp_ids:
            type: array
            items:
              type: string
          products:
            type: array
            items:
              type: string
          order_types:
            type: array
            items:
              type: string
          exchanges:
            type: array
            items:
              type: string
          pan:
            type: string
          user_shortname:
            type: string
          avatar_url:
            type: 'null'
          tags:
            type: array
            items: {}
          password_timestamp:
            type: string
          twofa_timestamp:
            type: string
          meta:
            type: object
            properties:
              cobrands:
                type: array
                items: {}
              poa:
                type: string
              features:
                type: array
                items:
                  type: string
              silo:
                type: string
              account_blocks:
                type: array
                items: {}
              cp_code:
                type: string
              welcome_email_sent:
                type: boolean
            required:
              - cobrands
              - poa
              - features
              - silo
              - account_blocks
              - cp_code
              - welcome_email_sent
        required:
          - user_id
          - twofa_type
          - user_name
          - user_type
          - email
          - phone
          - phone_code
          - broker
          - bank_accounts
          - dp_ids
          - products
          - order_types
          - exchanges
          - pan
          - user_shortname
          - avatar_url
          - tags
          - password_timestamp
          - twofa_timestamp
          - meta
    required:
      - status
      - data
  sampleResponse:
    status: success
    data:
      user_id: <userId>
      twofa_type: totp
      user_name: John Doe
      user_type: individual/ind_with_nom
      email: john.doe@example.com
      phone: '*0000'
      phone_code: '91'
      broker: ZERODHA
      bank_accounts:
        - name: TEST BANK A
          branch: ''
          account: '*0000'
        - name: TEST BANK B
          branch: ''
          account: '*0000'
      dp_ids:
        - '1200000000000000'
      products:
        - CNC
        - NRML
        - MIS
        - BO
        - CO
      order_types:
        - MARKET
        - LIMIT
        - SL
        - SL-M
      exchanges:
        - BSE
        - BFO
        - CDS
        - NFO
        - NSE
        - MF
      pan: '*592B'
      user_shortname: John
      avatar_url: null
      tags: []
      password_timestamp: '2019-02-23 02:28:58'
      twofa_timestamp: '2022-10-31 22:48:18'
      meta:
        cobrands: []
        poa: physical
        features:
          - 20depth
        silo: k
        account_blocks: []
        cp_code: ''
        welcome_email_sent: true
  description: Captured API Endpoint for kite.
