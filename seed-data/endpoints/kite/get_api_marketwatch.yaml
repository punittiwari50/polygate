endpoint:
  app: kite
  name: get_api_marketwatch
  path: /api/marketwatch
  method: GET
  requiresAuth: true
  requestHeaders:
    x-kite-version: 3.0.0
    sec-ch-ua-platform: '"Windows"'
    x-csrftoken: <csrfToken>
    referer: https://kite.zerodha.com/dashboard
    sec-ch-ua: '"Chromium";v="149", "Not)A;Brand";v="24"'
    x-kite-app-uuid: <userAppId>
    sec-ch-ua-mobile: '?0'
    x-kite-userid: <userId>
    user-agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like
      Gecko) Chrome/149.0.0.0 Safari/537.36
    accept: application/json, text/plain, */*
  responseBody:
    type: object
    properties:
      status:
        type: string
      data:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  weight:
                    type: integer
                  is_static:
                    type: boolean
                  static_id:
                    type: 'null'
                required:
                  - id
                  - name
                  - weight
                  - is_static
                  - static_id
          required:
            - name
            - items
    required:
      - status
      - data
  sampleResponse:
    status: success
    data:
      - name: Favorites
        items:
          - id: 1
            name: 😉😇🤑
            weight: 1
            is_static: false
            static_id: null
          - id: 2
            name: Watchlist 2
            weight: 2
            is_static: false
            static_id: null
          - id: 3
            name: Watchlist 3
            weight: 3
            is_static: false
            static_id: null
          - id: 4
            name: Watchlist 4
            weight: 4
            is_static: false
            static_id: null
          - id: 5
            name: '5'
            weight: 5
            is_static: false
            static_id: null
          - id: 6
            name: MW 6
            weight: 6
            is_static: false
            static_id: null
          - id: 7
            name: MW 7
            weight: 7
            is_static: false
            static_id: null
      - name: Others
        items: []
  description: Captured API Endpoint for kite.
